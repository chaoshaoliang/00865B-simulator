<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>00865B 套利監控系統 (自動化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow-2xl">
        <div class="flex justify-between items-center mb-10 border-b pb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-900">00865B 套利戰情室</h1>
                <p id="api-status" class="text-xs text-gray-400 mt-2 italic">正在獲取市場即時數據...</p>
            </div>
            <div class="text-right">
                <span class="text-sm text-gray-500">計算基準：台幣 100 萬</span>
                <div id="total-profit" class="text-3xl font-black mt-1">NT$ 0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                <p class="text-blue-600 font-bold mb-1">利差年化收益</p>
                <p id="interest-gain" class="text-2xl font-bold">NT$ 0</p>
            </div>
            <div id="fx-box" class="bg-red-50 p-6 rounded-2xl border border-red-100">
                <p id="fx-label" class="text-red-600 font-bold mb-1">匯兌預期損益</p>
                <p id="fx-impact" class="text-2xl font-bold">NT$ 0</p>
            </div>
            <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                <p class="text-gray-600 font-bold mb-1">損益兩平匯率</p>
                <p id="breakeven-point" class="text-2xl font-bold">0.000</p>
            </div>
        </div>

        <div class="h-64 mb-10">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">台幣信貸利率 (%) <small>(會自動儲存)</small></label>
                    <input type="number" id="loan-rate" step="0.01" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg font-bold text-blue-800">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">美債 (00865B) 殖利率 (%)</label>
                    <input type="number" id="bond-yield" step="0.01" value="4.9" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg">
                </div>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">進場/當前匯率 (自動更新)</label>
                    <div class="flex gap-2">
                        <input type="number" id="entry-fx" step="0.01" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg font-bold text-green-700">
                        <button onclick="fetchFxRate()" class="px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">更新</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">目標/離場匯率</label>
                    <input type="number" id="target-fx" step="0.01" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg font-bold text-orange-600">
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_AMOUNT = 1000000;
        let chart;

        // 初始化時嘗試讀取本地儲存的設定
        document.getElementById('loan-rate').value = localStorage.getItem('loanRate') || 2.8;
        document.getElementById('entry-fx').value = localStorage.getItem('entryFx') || 32.5;
        document.getElementById('target-fx').value = localStorage.getItem('targetFx') || 32.0;

        // 監聽輸入並自動儲存
        const inputs = ['loan-rate', 'bond-yield', 'entry-fx', 'target-fx'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (id !== 'bond-yield') localStorage.setItem(id.replace('-', ''), document.getElementById(id).value);
                updateUI();
            });
        });

        // 自動抓取匯率 (使用公開免費 API)
        async function fetchFxRate() {
            try {
                document.getElementById('api-status').innerText = "正在更新匯率...";
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const twdRate = data.rates.TWD;
                if (twdRate) {
                    document.getElementById('entry-fx').value = twdRate.toFixed(2);
                    localStorage.setItem('entryFx', twdRate.toFixed(2));
                    document.getElementById('api-status').innerText = `數據同步成功 (USD/TWD: ${twdRate.toFixed(2)})`;
                    updateUI();
                }
            } catch (e) {
                document.getElementById('api-status').innerText = "API 更新失敗，請手動輸入。";
            }
        }

        function updateUI() {
            const loan = parseFloat(document.getElementById('loan-rate').value);
            const bond = parseFloat(document.getElementById('bond-yield').value);
            const entry = parseFloat(document.getElementById('entry-fx').value);
            const target = parseFloat(document.getElementById('target-fx').value);

            const spreadGain = BASE_AMOUNT * ((bond - loan) / 100);
            const fxImpact = BASE_AMOUNT * ((target - entry) / entry);
            const netProfit = spreadGain + fxImpact;
            const breakeven = entry * (1 - ((bond - loan) / 100));

            // 更新文字
            document.getElementById('interest-gain').innerText = `NT$ ${Math.round(spreadGain).toLocaleString()}`;
            document.getElementById('fx-impact').innerText = `NT$ ${Math.round(fxImpact).toLocaleString()}`;
            document.getElementById('total-profit').innerText = `NT$ ${Math.round(netProfit).toLocaleString()}`;
            document.getElementById('breakeven-point').innerText = breakeven.toFixed(3);

            // 視覺回饋
            document.getElementById('total-profit').className = netProfit >= 0 ? "text-3xl font-black mt-1 text-green-600" : "text-3xl font-black mt-1 text-red-600";
            document.getElementById('fx-box').className = fxImpact >= 0 ? "bg-green-50 p-6 rounded-2xl border border-green-100" : "bg-red-50 p-6 rounded-2xl border border-red-100";
            document.getElementById('fx-label').className = fxImpact >= 0 ? "text-green-600 font-bold mb-1" : "text-red-600 font-bold mb-1";

            updateChart(spreadGain, fxImpact);
        }

        function updateChart(gain, fx) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['利息收益', '匯率變動', '最終淨損益'],
                    datasets: [{
                        data: [gain, fx, gain + fx],
                        backgroundColor: ['#3b82f6', fx >= 0 ? '#10b981' : '#ef4444', (gain + fx) >= 0 ? '#10b981' : '#ef4444']
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 初始運行
        fetchFxRate();
        updateUI();
    </script>
</body>
</html>
