<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>00865B 套利分析 (多帳戶版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 輸入框高度與文字緊湊化 */
        input[type="number"], select { font-size: 18px; font-weight: 900; color: #000000; -webkit-appearance: none; height: 42px; }
        .locked-field { background-color: #fffbeb !important; border-color: #d97706 !important; color: #92400e !important; }
        .stress-field { background-color: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        body { color: #000000; }
        html, body { height: 100%; overflow-x: hidden; }
    </style>
</head>
<body class="bg-slate-200 p-1 md:p-2 font-sans flex items-center justify-center min-h-screen">

<div class="w-full max-w-4xl bg-white rounded-xl shadow-2xl border-2 border-slate-300 flex flex-col" style="max-height: 98vh;">
    <div class="bg-white border-b-2 border-slate-300 p-3 flex justify-between items-center shrink-0">
        <div class="flex flex-col">
            <div class="flex items-end gap-3">
                <h1 class="text-2xl font-black text-black tracking-tight leading-none">00865B 套利分析</h1>
                <p id="sync-status" class="text-xs font-bold text-blue-700 leading-none pb-0.5">⏳ 同步中...</p>
            </div>
            <div class="flex items-center gap-2 mt-2">
                <span class="text-xs font-black text-black">帳戶：</span>
                <select id="user-selector" onchange="switchUser()" class="border-2 border-black rounded px-1 h-7 text-xs font-black bg-white">
                    </select>
                <button onclick="addUser()" class="bg-slate-800 text-white px-2 rounded font-black text-xs h-7 hover:bg-black transition">
                    + 新增
                </button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right flex items-center gap-2">
                <p class="text-xs font-black text-black uppercase">總淨利(TWD)</p>
                <p id="out-total" class="text-2xl md:text-3xl font-black text-black leading-none">NT$ 0</p>
            </div>
            <button onclick="triggerManualFetch()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-bold text-sm shadow-md active:scale-95 transition">
                🔄 同步
            </button>
        </div>
    </div>

    <div class="p-3 space-y-3 flex-1 overflow-y-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
            <div class="bg-blue-50 border-2 border-blue-200 p-2 rounded-lg flex flex-col justify-center">
                <p class="text-xs font-black text-black mb-0.5">利息淨收益 <span id="label-effective-yield" class="text-[10px] text-blue-600 ml-1"></span></p>
                <p id="out-interest" class="text-xl font-black text-blue-900 leading-none">NT$ 0</p>
            </div>
            <div id="fx-card" class="bg-slate-50 border-2 border-slate-200 p-2 rounded-lg flex flex-col justify-center">
                <p class="text-xs font-black text-black mb-0.5">匯兌損益</p>
                <p id="out-fx" class="text-xl font-black text-black leading-none">NT$ 0</p>
            </div>
            <div class="bg-emerald-50 border-2 border-emerald-200 p-2 rounded-lg flex flex-col justify-center">
                <p class="text-xs font-black text-black mb-0.5">利差緩衝度</p>
                <p id="out-buffer" class="text-xl font-black text-emerald-900 leading-none">0.00%</p>
            </div>
            <div class="bg-amber-50 border-2 border-amber-300 p-2 rounded-lg shadow-inner flex flex-col justify-center relative overflow-hidden">
                <p class="text-xs font-black text-black mb-0.5 z-10">損益兩平匯率</p>
                <p id="out-breakeven" class="text-2xl font-black text-amber-900 leading-none z-10">0.000</p>
            </div>
        </div>

        <div class="bg-slate-100 rounded-lg p-3 border-l-4 border-blue-500 shadow-sm">
            <div id="formula-detail" class="space-y-1 text-sm md:text-base font-bold text-black leading-tight"></div>
        </div>

        <div class="bg-slate-100 rounded-lg p-3 border-l-4 border-emerald-500 shadow-sm">
            <p class="text-base font-black text-black border-b border-slate-300 pb-1 mb-2">🎯 系統判定對策</p>
            <div id="strategy-guide" class="space-y-1"></div>
        </div>

        <div class="bg-white rounded-lg p-3 border-2 border-slate-200 space-y-3">
            <div class="grid grid-cols-4 gap-3">
                <div>
                    <label class="block text-xs font-black text-black mb-1">投資本金 (TWD)</label>
                    <input type="number" id="in-amount" value="1000000" class="w-full px-2 border-2 border-slate-400 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-black mb-1">持有天數</label>
                    <input type="number" id="in-days" value="365" class="w-full px-2 border-2 border-slate-400 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-black mb-1">台幣信貸利率(%)</label>
                    <input type="number" id="in-loan" step="0.01" value="2.8" class="w-full px-2 border-2 border-blue-400 text-blue-900 rounded-lg focus:border-blue-600 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-red-600 mb-1 truncate">
                        ⚠️預估變動(%) <span class="text-xs text-gray-600 font-bold ml-1">(降2碼填-0.5)</span>
                    </label>
                    <input type="number" id="in-stress" step="0.1" value="0" class="w-full px-2 border-2 stress-field rounded-lg outline-none focus:border-red-600">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 pt-2 border-t-2 border-slate-200">
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-[11px] font-black text-black mb-1">00865B 當前殖利率(%)</label>
                        <input type="number" id="in-yield" step="0.01" value="5.0" class="w-full px-2 border-2 border-slate-400 rounded-lg transition-all outline-none focus:border-blue-500">
                    </div>
                    <label class="flex flex-col items-center justify-center pb-2 cursor-pointer w-8 shrink-0">
                        <span class="text-[10px] font-black text-slate-500 mb-1" id="label-yield">自動</span>
                        <input type="checkbox" id="lock-yield" onchange="toggleLock('yield')" class="w-4 h-4 cursor-pointer accent-blue-600">
                    </label>
                </div>

                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-[11px] font-black text-black mb-1">進場 USD/TWD</label>
                        <input type="number" id="in-entry" step="0.01" value="32.50" class="w-full px-2 border-2 border-slate-400 rounded-lg transition-all outline-none focus:border-blue-500">
                    </div>
                    <label class="flex flex-col items-center justify-center pb-2 cursor-pointer w-8 shrink-0">
                        <span class="text-[10px] font-black text-slate-500 mb-1" id="label-entry">自動</span>
                        <input type="checkbox" id="lock-entry" onchange="toggleLock('entry')" class="w-4 h-4 cursor-pointer accent-blue-600">
                    </label>
                </div>

                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-[11px] font-black text-black mb-1">當前/預估匯率</label>
                        <input type="number" id="in-target" step="0.01" value="32.00" class="w-full px-2 border-2 border-slate-400 rounded-lg transition-all outline-none focus:border-blue-500">
                    </div>
                    <label class="flex flex-col items-center justify-center pb-2 cursor-pointer w-8 shrink-0">
                        <span class="text-[10px] font-black text-slate-500 mb-1" id="label-target">自動</span>
                        <input type="checkbox" id="lock-target" onchange="toggleLock('target')" class="w-4 h-4 cursor-pointer accent-blue-600">
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdzXOfzWMndCNLhzXY1-P487LQPfqQQBS0VAyZgz64vDKNwpBWna2vcH-uNU-cGziUERjJZBKvsnle/pub?output=csv";
    const FX_API_URL = "https://open.er-api.com/v6/latest/USD";

    const inputIds = ['in-amount', 'in-days', 'in-loan', 'in-stress', 'in-yield', 'in-entry', 'in-target'];
    const lockIds = ['yield', 'entry', 'target'];

    // 使用者列表管理邏輯
    let currentUser = localStorage.getItem('current_active_user') || '預設帳戶';
    let userList = JSON.parse(localStorage.getItem('00865b_user_list')) || ['預設帳戶'];

    function initializeSystem() {
        renderUserSelector();
        loadCurrentUserSettings();

        // 綁定所有輸入事件，即時存入該使用者存檔
        inputIds.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                saveCurrentUserSettings();
                updateAnalysis();
            });
        });

        lockIds.forEach(field => {
            document.getElementById(`lock-${field}`).addEventListener('change', () => {
                saveCurrentUserSettings();
                applyLockUI(field, false);
            });
        });

        fetchAllData();
    }

    // 更新使用者選單畫面
    function renderUserSelector() {
        const selector = document.getElementById('user-selector');
        selector.innerHTML = userList.map(u => `<option value="${u}" ${u === currentUser ? 'selected' : ''}>${u}</option>`).join('');
    }

    // 新增使用者
    function addUser() {
        const name = prompt("請輸入新帳戶名稱：");
        if (name && !userList.includes(name)) {
            userList.push(name);
            localStorage.setItem('00865b_user_list', JSON.stringify(userList));
            currentUser = name;
            localStorage.setItem('current_active_user', currentUser);
            renderUserSelector();
            // 新使用者給予預設值
            resetInputsToDefault();
            saveCurrentUserSettings();
            updateAnalysis();
        } else if (userList.includes(name)) {
            alert("名稱已存在！");
        }
    }

    // 切換使用者
    function switchUser() {
        currentUser = document.getElementById('user-selector').value;
        localStorage.setItem('current_active_user', currentUser);
        loadCurrentUserSettings();
        updateAnalysis();
        fetchAllData(); // 切換後自動抓一次最新的非鎖定數據
    }

    // 儲存當前使用者的專屬設定
    function saveCurrentUserSettings() {
        const settings = {};
        inputIds.forEach(id => settings[id] = document.getElementById(id).value);
        lockIds.forEach(field => settings[`lock_${field}`] = document.getElementById(`lock-${field}`).checked);
        localStorage.setItem(`00865b_settings_${currentUser}`, JSON.stringify(settings));
    }

    // 載入當前使用者的專屬設定
    function loadCurrentUserSettings() {
        const settings = JSON.parse(localStorage.getItem(`00865b_settings_${currentUser}`));
        if (settings) {
            inputIds.forEach(id => document.getElementById(id).value = settings[id] || "");
            lockIds.forEach(field => {
                const isLocked = settings[`lock_${field}`] === true;
                document.getElementById(`lock-${field}`).checked = isLocked;
                applyLockUI(field, true);
            });
        } else {
            resetInputsToDefault();
        }
    }

    function resetInputsToDefault() {
        // 提供初始預設值
        document.getElementById('in-amount').value = "1000000";
        document.getElementById('in-days').value = "365";
        document.getElementById('in-loan').value = "2.8";
        document.getElementById('in-stress').value = "0";
        lockIds.forEach(field => {
            document.getElementById(`lock-${field}`).checked = false;
            applyLockUI(field, true);
        });
    }

    // 原始功能保留區
    function applyLockUI(field, isInit = false) {
        const isLocked = document.getElementById(`lock-${field}`).checked;
        const label = document.getElementById(`label-${field}`);
        const input = document.getElementById(`in-${field}`);
        if(isLocked) {
            label.innerText = "鎖定";
            label.className = "text-[10px] font-black text-red-600 mb-1";
            input.classList.add('locked-field');
        } else {
            label.innerText = "自動";
            label.className = "text-[10px] font-black text-slate-500 mb-1";
            input.classList.remove('locked-field');
            if(!isInit) fetchAllData();
        }
    }

    function toggleLock(field) { applyLockUI(field, false); }
    function triggerManualFetch() { fetchAllData(); }

    async function fetchAllData() {
        const status = document.getElementById('sync-status');
        status.innerText = "⏳ 同步中...";
        status.className = "text-xs font-bold text-blue-700 leading-none pb-0.5";
        try {
            const fxRes = await fetch(FX_API_URL);
            const fxData = await fxRes.json();
            if(fxData.rates.TWD && !document.getElementById('lock-target').checked) {
                document.getElementById('in-target').value = fxData.rates.TWD.toFixed(2);
            }
            const sheetRes = await fetch(CSV_URL);
            const csv = await sheetRes.text();
            csv.split('\n').map(r => r.split(',')).forEach(row => {
                const key = row[0] ? row[0].trim() : "";
                const val = row[1] ? parseFloat(row[1].trim()) : null;
                if(!isNaN(val)) {
                    if(key.includes("殖利率") && !document.getElementById('lock-yield').checked) document.getElementById('in-yield').value = val;
                    if(key.includes("進場匯率") && !document.getElementById('lock-entry').checked) document.getElementById('in-entry').value = val;
                }
            });
            status.innerText = `✅ 已同步 (${new Date().toLocaleTimeString().slice(0,-3)}) - [${currentUser}]`;
            status.className = "text-xs font-bold text-green-700 leading-none pb-0.5";
            updateAnalysis();
        } catch (e) {
            status.innerText = "❌ 網路離線 (載入記憶)";
            status.className = "text-xs font-bold text-red-600 leading-none pb-0.5";
            updateAnalysis();
        }
    }

    function updateAnalysis() {
        const amount = parseFloat(document.getElementById('in-amount').value) || 0;
        const days = parseFloat(document.getElementById('in-days').value) || 1;
        const loan = parseFloat(document.getElementById('in-loan').value) || 0;
        const currentYield = parseFloat(document.getElementById('in-yield').value) || 0;
        const stressRate = parseFloat(document.getElementById('in-stress').value) || 0;
        const entry = parseFloat(document.getElementById('in-entry').value) || 1;
        const target = parseFloat(document.getElementById('in-target').value) || 1;

        const effectiveYield = currentYield + stressRate;
        const timeFactor = days / 365;
        const spreadPercent = (effectiveYield - loan) / 100;
        const interestGain = amount * spreadPercent * timeFactor;
        const fxLoss = amount * ((target - entry) / entry);
        const total = interestGain + fxLoss;
        const bufferPercent = spreadPercent * timeFactor;
        const breakeven = entry * (1 - bufferPercent);

        document.getElementById('label-effective-yield').innerText = `(實質 ${effectiveYield.toFixed(2)}%)`;
        document.getElementById('out-interest').innerText = `NT$ ${Math.round(interestGain).toLocaleString()}`;
        document.getElementById('out-fx').innerText = `NT$ ${Math.round(fxLoss).toLocaleString()}`;
        document.getElementById('out-total').innerText = `NT$ ${Math.round(total).toLocaleString()}`;
        document.getElementById('out-buffer').innerText = (bufferPercent * 100).toFixed(2) + "%";
        document.getElementById('out-breakeven').innerText = breakeven.toFixed(3);

        document.getElementById('out-total').className = total >= 0 ? "text-2xl md:text-3xl font-black leading-none text-green-600" : "text-2xl md:text-3xl font-black leading-none text-red-600";
        document.getElementById('fx-card').className = fxLoss >= 0 ? "bg-emerald-50 border-2 border-emerald-200 p-2 rounded-lg flex flex-col justify-center" : "bg-red-50 border-2 border-red-200 p-2 rounded-lg flex flex-col justify-center";
        document.getElementById('out-fx').className = fxLoss >= 0 ? "text-xl font-black leading-none text-emerald-800" : "text-xl font-black leading-none text-red-800";

        const spreadColor = spreadPercent >= 0 ? "text-blue-700" : "text-red-600 bg-red-100 px-1 rounded";
        document.getElementById('formula-detail').innerHTML = `
            <p>1. 實質年化利差: (${currentYield.toFixed(2)}%<span class="text-red-600">${stressRate >= 0 ? '+'+stressRate : stressRate}</span>%) - ${loan.toFixed(2)}% = <span class="${spreadColor} font-black">${(effectiveYield-loan).toFixed(2)}%</span></p>
            <p>2. 期間匯率防護罩: ${(effectiveYield-loan).toFixed(2)}% × (${days}/365) = <span class="${spreadColor}">${(bufferPercent*100).toFixed(2)}%</span></p>
            <p>3. 容忍底線: ${entry.toFixed(2)} × (1 - ${(bufferPercent*100).toFixed(2)}%) = <span class="text-red-600 text-xl font-black bg-yellow-100 px-1 rounded">${breakeven.toFixed(3)}</span></p>
            <p class="mt-1 pt-1 border-t border-slate-300 text-sm">👉 ${spreadPercent < 0 ? '<span class="text-red-600 font-black">警告：實質利差已轉負，匯率防護失效！</span>' : '美金不跌破 <span class="font-black text-red-600">' + breakeven.toFixed(3) + '</span> 即保本獲利。'}</p>
        `;

        // 策略指引判定
        let sTitle = "", sDesc = "", sAction = "";
        if (stressRate < 0) {
            if (target < entry) {
                if (total < 0) {
                    sTitle = "情境 A：最不利 (大幅降息 + 台幣大幅升值)";
                    sDesc = "利息收入減少，且承受嚴重的匯兌損失。";
                    sAction = "【降低比重】轉移至台幣低波高息資產或加碼科技股。";
                } else {
                    sTitle = "情境 B：中性偏弱 (緩步降息 + 台幣微幅升值)";
                    sDesc = "利息緩步下降，匯損侵蝕部分利息，總報酬打平。";
                    sAction = "【動態調整】維持水位作為加碼子彈。";
                }
            } else {
                sTitle = "情境 C：中性偏強 (降息 + 美元強勢)";
                sDesc = "利息變少但匯兌收益彌補缺口。";
                sAction = "【安心續抱】發揮避險功能。";
            }
        } else {
            sTitle = "情境 D：維持現狀 (延遲降息 / 匯率震盪)";
            sDesc = "持續享有高息滾入。";
            sAction = "【當作美元優利定存】穩健蓄水池。";
        }
        document.getElementById('strategy-guide').innerHTML = `
            <p class="text-[16px] font-black text-black leading-tight">${sTitle}</p>
            <p class="text-[15px] font-bold text-black leading-tight">${sDesc}</p>
            <p class="text-[16px] font-black text-black mt-1 bg-yellow-200 inline-block px-1 border border-black rounded">💡 指引：${sAction}</p>
        `;
    }

    window.onload = initializeSystem;
</script>

</body>
</html>
