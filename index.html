<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>00865B 套利分析 (高對比大字版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 針對 iPad 與觸控優化，確保輸入框文字夠大 */
        input[type="number"] { font-size: 18px; -webkit-appearance: none; font-weight: 900; color: #000; }
        .locked-field { background-color: #fffbeb !important; border-color: #f59e0b !important; color: #b45309 !important; }
        input:checked ~ .dot { transform: translateX(100%); }
        input:checked ~ .lock-bg { background-color: #f59e0b; }
        /* 強制所有未特別指定的文字為黑色 */
        body { color: #000000; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-6 font-sans">

<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl border border-gray-300 overflow-hidden">
    <div class="bg-white border-b-2 border-gray-200 p-5 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-black text-black">00865B 套利分析</h1>
            <p id="sync-status" class="text-sm font-bold text-blue-700 mt-1">等待數據同步中...</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-sm font-bold text-black">預計總淨利 (TWD)</p>
                <p id="out-total" class="text-3xl font-black text-black">NT$ 0</p>
            </div>
            <button onclick="fetchAllData()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold text-lg transition shadow-md">
                🔄 同步數據
            </button>
        </div>
    </div>

    <div class="p-5 space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white border-2 border-blue-200 p-4 rounded-xl shadow-sm">
                <p class="text-sm font-bold text-black mb-1">利息淨收益</p>
                <p id="out-interest" class="text-xl font-black text-blue-800">NT$ 0</p>
            </div>
            <div id="fx-card" class="bg-white border-2 border-gray-200 p-4 rounded-xl shadow-sm">
                <p id="fx-label" class="text-sm font-bold text-black mb-1">匯兌損益</p>
                <p id="out-fx" class="text-xl font-black text-black">NT$ 0</p>
            </div>
            <div class="bg-white border-2 border-green-200 p-4 rounded-xl shadow-sm">
                <p class="text-sm font-bold text-black mb-1">利差緩衝度</p>
                <p id="out-buffer" class="text-xl font-black text-green-800">0.00%</p>
            </div>
            <div class="bg-white border-2 border-red-200 p-4 rounded-xl shadow-sm">
                <p class="text-sm font-bold text-black mb-1">損益兩平匯率</p>
                <p id="out-breakeven" class="text-xl font-black text-red-700">0.000</p>
            </div>
        </div>

        <div class="bg-gray-100 rounded-xl p-5 border-l-8 border-blue-500 shadow-sm">
            <p class="text-lg font-black text-black mb-3 border-b border-gray-300 pb-2">📊 分析邏輯與計算式</p>
            <div id="formula-detail" class="space-y-2 text-base font-bold text-black">
                </div>
        </div>

        <div class="bg-white rounded-2xl p-6 border-2 border-gray-200 space-y-6 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-bold text-black mb-2">投資本金 (TWD)</label>
                    <input type="number" id="in-amount" value="1000000" class="w-full p-3 border-2 border-gray-400 rounded-xl bg-white focus:border-blue-600 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-black mb-2">持有天數</label>
                    <input type="number" id="in-days" value="365" class="w-full p-3 border-2 border-gray-400 rounded-xl bg-white focus:border-blue-600 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-black mb-2">台幣信貸年利率 (%)</label>
                    <input type="number" id="in-loan" step="0.01" value="2.8" class="w-full p-3 border-2 border-blue-400 rounded-xl text-blue-900 bg-white focus:border-blue-600 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4 border-t-2 border-gray-200">
                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-black mb-2">00865B 殖利率 (%)</label>
                        <input type="number" id="in-yield" step="0.01" value="5.0" class="w-full p-3 border-2 border-gray-400 rounded-xl bg-white">
                    </div>
                    <label class="flex flex-col items-center mt-6">
                        <span class="text-sm font-bold text-black mb-1" id="label-yield">自動</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="lock-yield" class="sr-only" onchange="toggleLock('yield')">
                            <div class="lock-bg block bg-gray-400 w-12 h-6 rounded-full transition"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition duration-200"></div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-black mb-2">進場 USD/TWD</label>
                        <input type="number" id="in-entry" step="0.01" value="32.50" class="w-full p-3 border-2 border-gray-400 rounded-xl bg-white">
                    </div>
                    <label class="flex flex-col items-center mt-6">
                        <span class="text-sm font-bold text-black mb-1" id="label-entry">自動</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="lock-entry" class="sr-only" onchange="toggleLock('entry')">
                            <div class="lock-bg block bg-gray-400 w-12 h-6 rounded-full transition"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition duration-200"></div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-black mb-2">即時/預估 USD/TWD</label>
                        <input type="number" id="in-target" step="0.01" value="32.00" class="w-full p-3 border-2 border-gray-400 rounded-xl bg-white">
                    </div>
                    <label class="flex flex-col items-center mt-6">
                        <span class="text-sm font-bold text-black mb-1" id="label-target">自動</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="lock-target" class="sr-only" onchange="toggleLock('target')">
                            <div class="lock-bg block bg-gray-400 w-12 h-6 rounded-full transition"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition duration-200"></div>
                        </div>
                    </label>
                </div>
            </div>
        </div>
        
        <p class="text-center text-sm font-bold text-black">
            💡 系統會自動記錄您的「信貸利率」，下次開啟無需重複輸入。
        </p>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdzXOfzWMndCNLhzXY1-P487LQPfqQQBS0VAyZgz64vDKNwpBWna2vcH-uNU-cGziUERjJZBKvsnle/pub?output=csv";
    const FX_API_URL = "https://open.er-api.com/v6/latest/USD";

    if(localStorage.getItem('00865b_loan_v2')) {
        document.getElementById('in-loan').value = localStorage.getItem('00865b_loan_v2');
    }

    const inputIds = ['in-amount', 'in-days', 'in-loan', 'in-yield', 'in-entry', 'in-target'];
    inputIds.forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            if(id === 'in-loan') localStorage.setItem('00865b_loan_v2', document.getElementById(id).value);
            updateAnalysis();
        });
    });

    function toggleLock(field) {
        const isLocked = document.getElementById(`lock-${field}`).checked;
        const input = document.getElementById(`in-${field}`);
        const label = document.getElementById(`label-${field}`);
        
        if(isLocked) {
            label.innerText = "鎖定";
            label.className = "text-sm font-black text-red-600 mb-1";
            input.classList.add('locked-field');
        } else {
            label.innerText = "自動";
            label.className = "text-sm font-bold text-black mb-1";
            input.classList.remove('locked-field');
            fetchAllData();
        }
    }

    async function fetchAllData() {
        const status = document.getElementById('sync-status');
        status.innerText = "🔄 正在同步雲端數據與國際匯率...";
        status.className = "text-sm font-bold text-blue-700 mt-1";

        let fetchSuccess = true;

        try {
            // 1. 抓取即時國際匯率 (USD to TWD)
            const fxRes = await fetch(FX_API_URL);
            const fxData = await fxRes.json();
            const liveTwdRate = fxData.rates.TWD;
            
            if(liveTwdRate && !document.getElementById('lock-target').checked) {
                document.getElementById('in-target').value = liveTwdRate.toFixed(2);
            }

            // 2. 抓取 Google Sheets 數據 (00865B 殖利率等)
            const sheetRes = await fetch(CSV_URL);
            const csv = await sheetRes.text();
            const rows = csv.split('\n').map(r => r.split(','));

            rows.forEach(row => {
                const key = row[0] ? row[0].trim() : "";
                const val = row[1] ? parseFloat(row[1].trim()) : null;

                if(!isNaN(val)) {
                    if(key.includes("殖利率") && !document.getElementById('lock-yield').checked) {
                        document.getElementById('in-yield').value = val;
                    }
                    if(key.includes("進場匯率") && !document.getElementById('lock-entry').checked) {
                        document.getElementById('in-entry').value = val;
                    }
                }
            });

            status.innerText = `✅ 同步完成 (${new Date().toLocaleTimeString()})`;
            status.className = "text-sm font-bold text-green-700 mt-1";
            updateAnalysis();

        } catch (e) {
            console.error("Fetch Error:", e);
            status.innerText = "❌ 同步失敗，請檢查網路連線";
            status.className = "text-sm font-bold text-red-600 mt-1";
        }
    }

    function updateAnalysis() {
        const amount = parseFloat(document.getElementById('in-amount').value) || 0;
        const days = parseFloat(document.getElementById('in-days').value) || 1;
        const loan = parseFloat(document.getElementById('in-loan').value) || 0;
        const yield = parseFloat(document.getElementById('in-yield').value) || 0;
        const entry = parseFloat(document.getElementById('in-entry').value) || 1;
        const target = parseFloat(document.getElementById('in-target').value) || 1;

        const timeFactor = days / 365;
        const spreadPercent = (yield - loan) / 100;
        
        const interestGain = amount * spreadPercent * timeFactor;
        const fxLoss = amount * ((target - entry) / entry);
        const total = interestGain + fxLoss;
        const bufferPercent = spreadPercent * timeFactor;
        const breakeven = entry * (1 - bufferPercent);

        document.getElementById('out-interest').innerText = `NT$ ${Math.round(interestGain).toLocaleString()}`;
        document.getElementById('out-fx').innerText = `NT$ ${Math.round(fxLoss).toLocaleString()}`;
        document.getElementById('out-total').innerText = `NT$ ${Math.round(total).toLocaleString()}`;
        document.getElementById('out-buffer').innerText = (bufferPercent * 100).toFixed(2) + "%";
        document.getElementById('out-breakeven').innerText = breakeven.toFixed(3);

        document.getElementById('out-total').className = total >= 0 ? "text-3xl font-black text-green-700" : "text-3xl font-black text-red-600";
        document.getElementById('fx-card').className = fxLoss >= 0 ? "bg-white border-2 border-green-200 p-4 rounded-xl shadow-sm" : "bg-white border-2 border-red-200 p-4 rounded-xl shadow-sm";
        document.getElementById('out-fx').className = fxLoss >= 0 ? "text-xl font-black text-green-800" : "text-xl font-black text-red-700";

        // 動態注入大字體公式說明
        document.getElementById('formula-detail').innerHTML = `
            <div class="bg-white p-3 rounded-lg border border-gray-300">
                <span class="text-blue-700">1. 年化淨利差：</span> ${yield.toFixed(2)}% - ${loan.toFixed(2)}% = <span class="text-red-600">${(yield-loan).toFixed(2)}%</span>
            </div>
            <div class="bg-white p-3 rounded-lg border border-gray-300">
                <span class="text-blue-700">2. 持有期間緩衝率：</span> ${(yield-loan).toFixed(2)}% × (${days}/365) = <span class="text-red-600">${(bufferPercent*100).toFixed(2)}%</span>
            </div>
            <div class="bg-white p-3 rounded-lg border border-gray-300">
                <span class="text-blue-700">3. 匯率容忍防線：</span> ${entry.toFixed(2)} × (1 - ${(bufferPercent*100).toFixed(2)}%) = <span class="text-red-600 text-xl font-black">${breakeven.toFixed(3)}</span>
            </div>
            <p class="mt-3 text-sm text-black">
                👉 結論：只要未來美金匯率不跌破 <span class="font-black text-red-600 bg-yellow-200 px-1">${breakeven.toFixed(3)}</span>，此套利策略即保本或獲利。
            </p>
        `;
    }

    // 初始化讀取
    fetchAllData();
</script>

</body>
</html>
