<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>00865B 套利分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 強制輸入框字體放大、加粗且純黑 */
        input[type="number"] { font-size: 18px; font-weight: 900; color: #000000; -webkit-appearance: none; }
        /* 鎖定狀態的視覺效果 */
        .locked-field { background-color: #fffbeb !important; border-color: #d97706 !important; color: #92400e !important; }
        input:checked ~ .dot { transform: translateX(100%); }
        input:checked ~ .lock-bg { background-color: #d97706; }
        /* 全域文字預設為純黑 */
        body { color: #000000; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-6 font-sans">

<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border-2 border-slate-300">
    <div class="bg-white border-b-2 border-slate-300 p-5 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-black text-black tracking-tight">00865B 套利分析</h1>
            <p id="sync-status" class="text-sm font-bold text-blue-700 mt-2">⏳ 正在同步雲端與匯率...</p>
        </div>
        <div class="flex items-center gap-5">
            <div class="text-right">
                <p class="text-sm font-black text-black">預計總淨利 (TWD)</p>
                <p id="out-total" class="text-3xl md:text-4xl font-black text-black mt-1">NT$ 0</p>
            </div>
            <button onclick="fetchAllData()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold shadow-md transition active:scale-95">
                🔄 重新同步
            </button>
        </div>
    </div>

    <div class="p-4 md:p-6 space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-blue-50 border-2 border-blue-200 p-4 rounded-xl">
                <p class="text-sm font-black text-black mb-1">利息淨收益</p>
                <p id="out-interest" class="text-2xl font-black text-blue-900">NT$ 0</p>
            </div>
            <div id="fx-card" class="bg-slate-50 border-2 border-slate-200 p-4 rounded-xl">
                <p id="fx-label" class="text-sm font-black text-black mb-1">匯兌預期損益</p>
                <p id="out-fx" class="text-2xl font-black text-black">NT$ 0</p>
            </div>
            <div class="bg-emerald-50 border-2 border-emerald-200 p-4 rounded-xl">
                <p class="text-sm font-black text-black mb-1">利差緩衝度</p>
                <p id="out-buffer" class="text-2xl font-black text-emerald-900">0.00%</p>
            </div>
            <div class="bg-amber-50 border-2 border-amber-300 p-4 rounded-xl shadow-inner">
                <p class="text-sm font-black text-black mb-1">損益兩平匯率</p>
                <p id="out-breakeven" class="text-3xl font-black text-amber-900">0.000</p>
            </div>
        </div>

        <div class="bg-slate-100 rounded-xl p-5 border-l-8 border-blue-500 shadow-sm">
            <p class="text-lg font-black text-black mb-3 border-b border-slate-300 pb-2">📊 計算式拆解</p>
            <div id="formula-detail" class="space-y-3 text-base md:text-lg font-bold text-black">
                </div>
        </div>

        <div class="bg-white rounded-2xl p-5 border-2 border-slate-200 space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-5">
                <div>
                    <label class="block text-sm font-black text-black mb-2">投資本金 (TWD)</label>
                    <input type="number" id="in-amount" value="1000000" class="w-full p-3 border-2 border-slate-400 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-black text-black mb-2">持有天數</label>
                    <input type="number" id="in-days" value="365" class="w-full p-3 border-2 border-slate-400 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-black text-black mb-2">台幣信貸年利率 (%)</label>
                    <input type="number" id="in-loan" step="0.01" value="2.8" class="w-full p-3 border-2 border-blue-400 text-blue-900 rounded-xl focus:border-blue-600 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 pt-4 border-t-2 border-slate-200">
                <div class="flex items-center gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-black text-black mb-2">00865B 殖利率 (%)</label>
                        <input type="number" id="in-yield" step="0.01" value="5.0" class="w-full p-3 border-2 border-slate-400 rounded-xl transition-all">
                    </div>
                    <label class="flex flex-col items-center mt-6">
                        <span class="text-sm font-black text-black mb-1" id="label-yield">自動</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="lock-yield" class="sr-only" onchange="toggleLock('yield')">
                            <div class="lock-bg block bg-slate-400 w-12 h-6 rounded-full transition"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition duration-200"></div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-black text-black mb-2">進場 USD/TWD</label>
                        <input type="number" id="in-entry" step="0.01" value="32.50" class="w-full p-3 border-2 border-slate-400 rounded-xl transition-all">
                    </div>
                    <label class="flex flex-col items-center mt-6">
                        <span class="text-sm font-black text-black mb-1" id="label-entry">自動</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="lock-entry" class="sr-only" onchange="toggleLock('entry')">
                            <div class="lock-bg block bg-slate-400 w-12 h-6 rounded-full transition"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition duration-200"></div>
                        </div>
                    </label>
                </div>

                <div class="flex items-center gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-black text-black mb-2">出場/當前匯率</label>
                        <input type="number" id="in-target" step="0.01" value="32.00" class="w-full p-3 border-2 border-slate-400 rounded-xl transition-all">
                    </div>
                    <label class="flex flex-col items-center mt-6">
                        <span class="text-sm font-black text-black mb-1" id="label-target">自動</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="lock-target" class="sr-only" onchange="toggleLock('target')">
                            <div class="lock-bg block bg-slate-400 w-12 h-6 rounded-full transition"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition duration-200"></div>
                        </div>
                    </label>
                </div>
            </div>
        </div>
        
        <p class="text-center text-sm font-black text-black">
            💡 系統會自動記錄您的「信貸利率」，下次開啟無需重複輸入。
        </p>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdzXOfzWMndCNLhzXY1-P487LQPfqQQBS0VAyZgz64vDKNwpBWna2vcH-uNU-cGziUERjJZBKvsnle/pub?output=csv";
    const FX_API_URL = "https://open.er-api.com/v6/latest/USD";

    // 讀取記憶
    if(localStorage.getItem('00865b_loan_v3')) {
        document.getElementById('in-loan').value = localStorage.getItem('00865b_loan_v3');
    }

    // 綁定輸入事件
    const inputIds = ['in-amount', 'in-days', 'in-loan', 'in-yield', 'in-entry', 'in-target'];
    inputIds.forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            if(id === 'in-loan') localStorage.setItem('00865b_loan_v3', document.getElementById(id).value);
            updateAnalysis();
        });
    });

    function toggleLock(field) {
        const isLocked = document.getElementById(`lock-${field}`).checked;
        const input = document.getElementById(`in-${field}`);
        const label = document.getElementById(`label-${field}`);
        
        if(isLocked) {
            label.innerText = "鎖定";
            label.className = "text-sm font-black text-amber-600 mb-1";
            input.classList.add('locked-field');
        } else {
            label.innerText = "自動";
            label.className = "text-sm font-black text-black mb-1";
            input.classList.remove('locked-field');
            fetchAllData();
        }
    }

    // 雙引擎同步：Google Sheets + 國際匯率 API
    async function fetchAllData() {
        const status = document.getElementById('sync-status');
        status.innerText = "🔄 正在同步雲端與匯率...";
        status.className = "text-sm font-bold text-blue-700 mt-2";

        try {
            // 1. 抓取國際匯率 (USD to TWD) 作為預估出場/當前匯率
            const fxRes = await fetch(FX_API_URL);
            const fxData = await fxRes.json();
            const liveTwdRate = fxData.rates.TWD;
            
            if(liveTwdRate && !document.getElementById('lock-target').checked) {
                document.getElementById('in-target').value = liveTwdRate.toFixed(2);
            }

            // 2. 抓取 Google Sheets (00865B 殖利率與進場匯率)
            const sheetRes = await fetch(CSV_URL);
            const csv = await sheetRes.text();
            const rows = csv.split('\n').map(r => r.split(','));

            rows.forEach(row => {
                const key = row[0] ? row[0].trim() : "";
                const val = row[1] ? parseFloat(row[1].trim()) : null;

                if(!isNaN(val)) {
                    if(key.includes("殖利率") && !document.getElementById('lock-yield').checked) {
                        document.getElementById('in-yield').value = val;
                    }
                    if(key.includes("進場匯率") && !document.getElementById('lock-entry').checked) {
                        document.getElementById('in-entry').value = val;
                    }
                }
            });

            status.innerText = `✅ 雙重同步成功 (${new Date().toLocaleTimeString()})`;
            status.className = "text-sm font-bold text-green-700 mt-2";
            updateAnalysis();

        } catch (e) {
            console.error(e);
            status.innerText = "❌ 同步失敗，請檢查網路";
            status.className = "text-sm font-bold text-red-600 mt-2";
            // 即使失敗也更新一次計算
            updateAnalysis();
        }
    }

    function updateAnalysis() {
        const amount = parseFloat(document.getElementById('in-amount').value) || 0;
        const days = parseFloat(document.getElementById('in-days').value) || 1;
        const loan = parseFloat(document.getElementById('in-loan').value) || 0;
        const yield = parseFloat(document.getElementById('in-yield').value) || 0;
        const entry = parseFloat(document.getElementById('in-entry').value) || 1;
        const target = parseFloat(document.getElementById('in-target').value) || 1;

        const timeFactor = days / 365;
        const spreadPercent = (yield - loan) / 100;
        
        // 核心計算
        const interestGain = amount * spreadPercent * timeFactor;
        const fxLoss = amount * ((target - entry) / entry);
        const total = interestGain + fxLoss;
        const bufferPercent = spreadPercent * timeFactor;
        const breakeven = entry * (1 - bufferPercent);

        // 更新 UI
        document.getElementById('out-interest').innerText = `NT$ ${Math.round(interestGain).toLocaleString()}`;
        document.getElementById('out-fx').innerText = `NT$ ${Math.round(fxLoss).toLocaleString()}`;
        document.getElementById('out-total').innerText = `NT$ ${Math.round(total).toLocaleString()}`;
        document.getElementById('out-buffer').innerText = (bufferPercent * 100).toFixed(2) + "%";
        document.getElementById('out-breakeven').innerText = breakeven.toFixed(3);

        // 視覺顏色：獲利綠色、虧損紅色
        document.getElementById('out-total').className = total >= 0 ? "text-3xl md:text-4xl font-black mt-1 text-green-600" : "text-3xl md:text-4xl font-black mt-1 text-red-600";
        document.getElementById('fx-card').className = fxLoss >= 0 ? "bg-emerald-50 border-2 border-emerald-200 p-4 rounded-xl" : "bg-red-50 border-2 border-red-200 p-4 rounded-xl";
        document.getElementById('out-fx').className = fxLoss >= 0 ? "text-2xl font-black text-emerald-800" : "text-2xl font-black text-red-800";

        // 動態注入公式說明 (大黑字、重點標色)
        document.getElementById('formula-detail').innerHTML = `
            <p>1. 年化利差：${yield.toFixed(2)}% - ${loan.toFixed(2)}% = <span class="text-blue-700">${(yield-loan).toFixed(2)}%</span></p>
            <p>2. 持有期緩衝率：${(yield-loan).toFixed(2)}% × (${days}/365) = <span class="text-blue-700">${(bufferPercent*100).toFixed(2)}%</span></p>
            <p>3. 匯率容忍底線：${entry.toFixed(2)} × (1 - ${(bufferPercent*100).toFixed(2)}%) = <span class="text-red-600 text-2xl font-black bg-yellow-100 px-1 rounded">${breakeven.toFixed(3)}</span></p>
            <p class="mt-3 text-sm text-black pt-2 border-t border-slate-300">
                👉 結論：只要未來美金不跌破 <span class="font-black text-red-600">${breakeven.toFixed(3)}</span>，策略即保本或獲利。
            </p>
        `;
    }

    // 首次執行同步
    fetchAllData();
</script>

</body>
</html>
